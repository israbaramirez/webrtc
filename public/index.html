<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Videollamada WebRTC</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel header-panel">
        <div>
          <h1>Videollamada WebRTC</h1>
          <p>Proyecto base con Node.js, WebSocket y WebRTC.</p>
        </div>
        <div class="room-controls">
          <input id="roomInput" type="text" placeholder="Escribe una sala. Ej: ori-mahana" />
          <button id="joinBtn">Unirme</button>
          <button id="leaveBtn" class="secondary" disabled>Salir</button>
        </div>
      </section>

      <section class="panel status-panel">
        <strong>Estado:</strong>
        <span id="status">Esperando unirte a una sala...</span>
      </section>

      <section class="video-grid">
        <article class="video-card panel">
          <div class="video-title">Tu cámara</div>
          <video id="localVideo" autoplay playsinline muted></video>
        </article>
        <article class="video-card panel">
          <div class="video-title">Participante remoto</div>
          <video id="remoteVideo" autoplay playsinline playsinline></video>
        </article>
      </section>

      <section class="panel actions">
        <button id="toggleAudioBtn" disabled>Silenciar micrófono</button>
        <button id="toggleVideoBtn" disabled>Apagar cámara</button>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
